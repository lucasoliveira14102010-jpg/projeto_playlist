            <!-- MODAL -->
            <div id="playerModal" class="modal">
            <div class="modal-content">

                <span class="fechar" onclick="fecharModal()">&times;</span>

                <img id="modalImg">
                <h2 id="modalTitulo"></h2>

                 <audio id="modalAudio" controls></audio>

                <a id="spotifyLink" target="_blank">
                    
                <button class="botao">Ouvir no Spotify</button>
                </a>

<script>

function abrirModal(img, titulo, musica, link) {
  document.getElementById("playerModal").style.display = "flex";

  document.getElementById("modalImg").src = img;
  document.getElementById("modalTitulo").innerText = titulo;
  document.getElementById("modalAudio").src = musica;
  document.getElementById("spotifyLink").href = link;
}

function fecharModal() {
  let modal = document.getElementById("playerModal");
  let audio = document.getElementById("modalAudio");

  modal.style.display = "none";
  audio.pause();
  audio.currentTime = 0;
}

// fechar clicando fora
window.onclick = function(event) {
  let modal = document.getElementById("playerModal");
  if (event.target === modal) {
    fecharModal();
  }
}

// volume padrão
window.onload = function() {
  document.getElementById("modalAudio").volume = 0.25;
}

</script>
